server:
  port: 8086

spring:
  application:
    name: gpt-service

yagpt:
  api:
    url: https://llm.api.cloud.yandex.net/foundationModels/v1/completion
    key: ${YAGPT_API_KEY}
  folder:
    id: ${YAGPT_FOLDER_ID}
  model: yandexgpt
  max-tokens: 1000
  temperature: 0.7

  timeout:
    connect: 5000
    read: 30000

  prompts:
    config-location: classpath:prompts.yaml