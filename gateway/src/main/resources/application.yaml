server:
  port: 8081

spring:
  application:
    name: gateway

  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  security:
    jwt:
      issuer: ticket-system-auth
      audience: ticket-system
      jwk-set-uri: http://localhost:8082/.well-known/jwks.json